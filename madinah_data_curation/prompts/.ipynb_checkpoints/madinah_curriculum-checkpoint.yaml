version: 1

# System prompt used for fine-tuning examples.
system_prompt: >
  أجب بإيجاز وبالعربية الفصحى فقط. إذا كان السؤال اختيارًا من متعدد،
  فأجب بحرف الإجابة فقط (أ، ب، ج، د) دون أي شرح.

topics:
  - name: النحو_الأساسي
    difficulty: مبتدئ
    focus: الإعراب والمبتدأ والخبر والجملة الاسمية والفعلية
  - name: الصرف_الأساسي
    difficulty: مبتدئ
    focus: الميزان الصرفي، تصريف الفعل الماضي والمضارع والأمر
  - name: الإعراب_المتوسط
    difficulty: متوسط
    focus: النواسخ، الأفعال الخمسة، المفاعيل، التمييز
  - name: الصرف_المتقدم
    difficulty: متقدم
    focus: الإعلال والإبدال، الأوزان المزيدة، المشتقات
  - name: علامات_الإعراب
    difficulty: متوسط
    focus: العلامات الأصلية والفرعية، المثنى والجمع
  - name: الأساليب
    difficulty: متوسط
    focus: الشرط، الاستثناء، النداء، التوكيد

templates:
  mcq_prompt: |
    أنت مدرس في منهج كتب المدينة لتعليم النحو والصرف.
    أنشئ سؤال اختيار من متعدد عن الموضوع: "{topic}" بمستوى "{difficulty}".
    الشروط:
    - سؤال واحد فقط.
    - أربع خيارات فقط بعلامات عربية: أ، ب، ج، د.
    - إجابة صحيحة واحدة فقط.
    - صياغة عربية فصيحة دون عامية.
    أعد الناتج في JSON فقط بهذه الحقول:
    {
      "question": "...",
      "options": {"أ": "...", "ب": "...", "ج": "...", "د": "..."},
      "answer": "أ"
    }

  dialogue_prompt: |
    أنشئ حوارًا تعليميًا قصيرًا من 2-3 أدوار عن الموضوع: "{topic}".
    اجعل الحوار يركز على قاعدة نحوية أو صرفية محددة ويصل إلى إجابة موجزة.
    أعد الناتج في JSON فقط بهذه الحقول:
    {
      "messages": [
        {"role": "user", "content": "..."},
        {"role": "assistant", "content": "..."}
      ]
    }
